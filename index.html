<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Volcano Switchback Labyrinth</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-align: center; z-index: 10; }
        button { pointer-events: auto; padding: 15px 35px; font-size: 20px; cursor: pointer; background: #111; color: #ff4500; border: 3px solid #ff4500; border-radius: 50px; text-transform: uppercase; box-shadow: 0 0 20px #ff4500; }
        #winContainer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; flex-direction: column; align-items: center; pointer-events: none; z-index: 100; }
        #worm { font-size: 80px; }
        #winText { color: #ff00ff; font-size: 40px; text-shadow: 0 0 20px #ff00ff; opacity: 0; transform: scale(0.5); transition: 0.5s; }
        .show-win #winText { opacity: 1; transform: scale(1); }
    </style>
</head>
<body>
    <div id="ui"><h1>CORE WARP</h1><button id="startBtn">IGNITION</button></div>
    <div id="winContainer"><div id="worm">🪱</div><div id="winText">AAHHHMAZING!</div></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const winContainer = document.getElementById('winContainer');
        
        let ball = { x: 0, y: 0, radius: 6, vx: 0, vy: 0 };
        let walls = [];
        let active = false;
        let cx, cy, level = 1;
        let teleRotation = 0;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cx = canvas.width / 2; cy = canvas.height / 2;
            generateLevel();
        }

        function generateLevel() {
            walls = [];
            if (level % 2 !== 0) {
                // NEON MAZE WORLD
                const rings = 6;
                const dist = (Math.min(canvas.width, canvas.height)/2 - 50) / rings;
                for (let i = 1; i <= rings; i++) {
                    let gap = Math.random() * 6.28;
                    walls.push({ r: i * dist, gapS: gap, gapE: gap + 0.7, type: 'neon' });
                }
                ball.x = cx + (rings * dist); ball.y = cy;
            } else {
                // VOLCANO WORLD: SWITCHBACKS
                const rings = 7;
                const dist = (Math.min(canvas.width, canvas.height)/2 - 50) / rings;
                // Create winding switchback path
                for (let i = 1; i <= rings; i++) {
                    // Alternate gaps every 180 degrees to force a "switchback" path
                    let gap = (i % 2 === 0) ? 0 : Math.PI;
                    walls.push({ r: i * dist, gapS: gap, gapE: gap + 1.2, type: 'mountain' });
                }
                ball.x = cx + (rings * dist); ball.y = cy;
            }
            ball.vx = 0; ball.vy = 0;
        }

        function drawTeleidoscope() {
            teleRotation += 0.02;
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(teleRotation);
            for (let i = 0; i < 6; i++) {
                ctx.rotate(Math.PI / 3);
                ctx.beginPath();
                ctx.moveTo(0, 0); ctx.lineTo(20, 40); ctx.lineTo(-20, 40); ctx.closePath();
                ctx.strokeStyle = level % 2 !== 0 ? "#0ff" : "#ff4500";
                ctx.shadowBlur = 15; ctx.shadowColor = ctx.strokeStyle;
                ctx.stroke();
            }
            ctx.restore();
        }

        function update() {
            if (!active) return;
            ball.x += ball.vx; ball.y += ball.vy;
            ball.vx *= 0.98; ball.vy *= 0.98;

            const dist = Math.hypot(ball.x - cx, ball.y - cy);
            const angle = (Math.atan2(ball.y - cy, ball.x - cx) + 6.28) % 6.28;

            walls.forEach(w => {
                if (Math.abs(dist - w.r) < ball.radius + 3) {
                    let blocked = !(angle > w.gapS && angle < w.gapE);
                    // Special check for gaps crossing the 0/2PI line
                    if (w.gapE > 6.28) {
                        blocked = !(angle > w.gapS || angle < w.gapE % 6.28);
                    }
                    if (blocked) {
                        const push = (dist > w.r) ? 1.2 : -1.2;
                        ball.x = cx + Math.cos(angle) * (w.r + (push * (ball.radius + 2)));
                        ball.y = cy + Math.sin(angle) * (w.r + (push * (ball.radius + 2)));
                        ball.vx *= -0.5; ball.vy *= -0.5;
                        if(navigator.vibrate) navigator.vibrate(5);
                    }
                }
            });

            if (dist < 25) { // Goal reached
                active = false;
                winContainer.style.display = "flex";
                winContainer.classList.add('show-win');
                setTimeout(() => {
                    winContainer.classList.remove('show-win');
                    winContainer.style.display = "none";
                    level++; generateLevel(); active = true;
                }, 2000);
            }
        }

        function draw() {
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw Goal (Wormhole or Lava Crater)
            if (level % 2 === 0) {
                // Pulsing Lava Crater
                const pulse = 20 + Math.sin(Date.now() / 200) * 5;
                ctx.fillStyle = "#ff4500"; ctx.shadowBlur = 30; ctx.shadowColor = "red";
                ctx.beginPath(); ctx.arc(cx, cy, pulse, 0, 6.28); ctx.fill();
            } else {
                drawTeleidoscope();
            }

            walls.forEach(w => {
                ctx.beginPath();
                ctx.lineWidth = w.type === 'mountain' ? 8 : 4;
                ctx.shadowBlur = 10;
                if (w.type === 'neon') {
                    ctx.strokeStyle = "#0ff"; ctx.shadowColor = "#0ff";
                } else {
                    ctx.strokeStyle = "#8b4513"; ctx.shadowColor = "#442200"; // Brown Mountain
                }
                ctx.arc(cx, cy, w.r, w.gapE, w.gapS);
                ctx.stroke();
            });

            // Ball
            ctx.fillStyle = "white"; ctx.shadowBlur = 10; ctx.shadowColor = "white";
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, 6.28); ctx.fill();

            update(); requestAnimationFrame(draw);
        }

        startBtn.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => {
                    if (s === 'granted') window.addEventListener('deviceorientation', e => {
                        ball.vx += e.gamma * 0.15; ball.vy += e.beta * 0.15;
                    });
                });
            } else {
                window.addEventListener('deviceorientation', e => {
                    ball.vx += e.gamma * 0.15; ball.vy += e.beta * 0.15;
                });
            }
            document.getElementById('ui').style.display = "none"; active = true;
        });

        window.addEventListener('resize', init);
        init(); draw();
    </script>
</body>
</html>
