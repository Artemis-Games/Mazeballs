<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Labyrinth Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.5)); }
        #ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #0ff; text-align: center; pointer-events: none; }
        button { pointer-events: auto; padding: 15px 30px; font-size: 20px; cursor: pointer; background: transparent; color: #0ff; border: 2px solid #0ff; border-radius: 50px; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 15px #0ff; }
        #winMsg { position: absolute; top: 30%; width: 100%; text-align: center; color: #f0f; font-size: 40px; text-shadow: 0 0 20px #f0f; display: none; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h1 id="title">NEON LABYRINTH</h1>
        <button id="startBtn">START MISSION</button>
    </div>
    <div id="winMsg">AAHHHMAZING!</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const winMsg = document.getElementById('winMsg');
        
        let ball = { x: 0, y: 0, radius: 10, vx: 0, vy: 0 };
        let level = 0; // 0: Circle, 1: Triangle, 2: Square
        let walls = [];
        let traps = [];
        let goal = { x: 0, y: 0, radius: 25 };
        let active = false;

        function initLevel() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            walls = []; traps = [];
            ball.x = 50; ball.y = 50; ball.vx = 0; ball.vy = 0;

            if (level === 0) { // CIRCULAR MAZE
                for(let i=0; i<5; i++) {
                    const r = 60 + i*50;
                    const gap = Math.random() * Math.PI * 2;
                    walls.push({type: 'arc', cx, cy, r, gapStart: gap, gapEnd: gap + 0.8});
                }
                goal = { x: cx, y: cy, radius: 20 };
            } else if (level === 1) { // TRIANGLE MAZE
                walls.push({type: 'line', x1: cx, y1: 100, x2: 50, y2: canvas.height-50});
                walls.push({type: 'line', x1: 50, y1: canvas.height-50, x2: canvas.width-50, y2: canvas.height-50});
                walls.push({type: 'line', x1: canvas.width-50, y1: canvas.height-50, x2: cx, y2: 100});
                // Trap doors (Dead ends)
                traps.push({x: cx, y: cy, r: 20});
                goal = { x: cx, y: canvas.height - 100, radius: 20 };
            } else { // SQUARE MAZE
                const size = Math.min(canvas.width, canvas.height) * 0.8;
                const ox = (canvas.width - size)/2;
                const oy = (canvas.height - size)/2;
                walls.push({type: 'rect', x: ox, y: oy, w: size, h: size});
                // Complicated inner walls
                for(let i=1; i<4; i++) {
                    walls.push({type: 'line', x1: ox + (i*size/4), y1: oy, x2: ox + (i*size/4), y2: oy + size*0.7});
                }
                goal = { x: ox + size - 40, y: oy + size - 40, radius: 20 };
            }
        }

        function draw() {
            ctx.fillStyle = "rgba(5, 5, 5, 0.3)"; // Trail effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Walls with Neon Glow
            ctx.strokeStyle = "#0ff";
            ctx.lineWidth = 4;
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#0ff";

            walls.forEach(w => {
                ctx.beginPath();
                if(w.type === 'arc') ctx.arc(w.cx, w.cy, w.r, w.gapEnd, w.gapStart);
                else if(w.type === 'line') { ctx.moveTo(w.x1, w.y1); ctx.lineTo(w.x2, w.y2); }
                else if(w.type === 'rect') ctx.strokeRect(w.x, w.y, w.w, w.h);
                ctx.stroke();
            });

            // Draw Traps (Dead Ends)
            ctx.strokeStyle = "#f00";
            ctx.shadowColor = "#f00";
            traps.forEach(t => {
                ctx.beginPath(); ctx.arc(t.x, t.y, t.r, 0, Math.PI*2); ctx.stroke();
            });

            // Draw Goal
            ctx.strokeStyle = "#f0f";
            ctx.shadowColor = "#f0f";
            ctx.beginPath(); ctx.arc(goal.x, goal.y, goal.radius, 0, Math.PI*2); ctx.stroke();

            // Draw Ball (The Pinball)
            if (active) {
                ctx.fillStyle = "#fff";
                ctx.shadowColor = "#fff";
                ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2); ctx.fill();
                update();
            }
            requestAnimationFrame(draw);
        }

        function update() {
            ball.vx *= 0.98; ball.vy *= 0.98;
            ball.x += ball.vx; ball.y += ball.vy;

            // Screen wrap/bounds
            if (ball.x < 0) ball.x = canvas.width;
            if (ball.x > canvas.width) ball.x = 0;
            if (ball.y < 0) ball.y = canvas.height;
            if (ball.y > canvas.height) ball.y = 0;

            // Check Win
            if (Math.hypot(ball.x - goal.x, ball.y - goal.y) < goal.radius) {
                active = false;
                winMsg.style.display = "block";
                setTimeout(() => {
                    winMsg.style.display = "none";
                    level = (level + 1) % 3;
                    initLevel();
                    active = true;
                }, 2000);
            }
        }

        function handleTilt(e) {
            if (!active) return;
            ball.vx += e.gamma * 0.12;
            ball.vy += e.beta * 0.12;
        }

        startBtn.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => {
                    if (s === 'granted') window.addEventListener('deviceorientation', handleTilt);
                });
            } else {
                window.addEventListener('deviceorientation', handleTilt);
            }
            document.getElementById('ui').style.display = "none";
            active = true; initLevel();
        });

        draw();
    </script>
</body>
</html>
