<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Worms Style Labyrinth</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a0f0a; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff9d00; text-align: center; z-index: 10; }
        button { pointer-events: auto; padding: 15px 35px; font-size: 20px; cursor: pointer; background: #3d1c02; color: #fff; border: 4px solid #ff4500; border-radius: 10px; text-transform: uppercase; box-shadow: 0 0 15px #ff4500; }
        #win { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); color: #ff00ff; font-size: 50px; text-shadow: 0 0 20px #ff00ff; pointer-events: none; z-index: 100; transition: 0.5s; text-align: center; }
        .show-win { transform: translate(-50%, -50%) scale(1) !important; }
    </style>
</head>
<body>
    <div id="ui"><h1>AERIAL VOLCANO</h1><button id="startBtn">START CLIMB</button></div>
    <div id="win">🪱<br>AAHHHMAZING!</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const winDisplay = document.getElementById('win');
        
        let ball = { x: 0, y: 0, radius: 5, vx: 0, vy: 0 };
        let walls = [];
        let active = false;
        let cx, cy;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cx = canvas.width / 2; cy = canvas.height / 2;
            generateWormsTerrain();
        }

        function generateWormsTerrain() {
            walls = [];
            const layers = 7;
            const dist = (Math.min(canvas.width, canvas.height)/2 - 40) / layers;

            for (let i = 1; i <= layers; i++) {
                const r = i * dist;
                const gap = Math.random() * 6.28;
                // Jagged points to create a "hand-drawn" rocky look
                let points = [];
                for(let a=0; a<6.28; a+=0.1) {
                    const noise = Math.sin(a * 12 + i) * 6;
                    points.push({x: Math.cos(a)*(r+noise), y: Math.sin(a)*(r+noise), angle: a});
                }
                walls.push({ points, r, gapS: gap, gapE: gap + 0.8 });
            }
            ball.x = cx + (layers * dist); ball.y = cy;
            ball.vx = 0; ball.vy = 0;
        }

        function update() {
            if (!active) return;
            ball.x += ball.vx; ball.y += ball.vy;
            ball.vx *= 0.98; ball.vy *= 0.98;

            const dist = Math.hypot(ball.x - cx, ball.y - cy);
            const angle = (Math.atan2(ball.y - cy, ball.x - cx) + 6.28) % 6.28;

            walls.forEach(w => {
                if (Math.abs(dist - w.r) < ball.radius + 6) {
                    let inGap = (angle > w.gapS && angle < w.gapE);
                    if (w.gapE > 6.28) inGap = (angle > w.gapS || angle < w.gapE % 6.28);
                    
                    if (!inGap) {
                        const push = (dist > w.r) ? 1.8 : -1.8;
                        ball.x = cx + Math.cos(angle) * (w.r + (push * 7));
                        ball.y = cy + Math.sin(angle) * (w.r + (push * 7));
                        ball.vx *= -0.5; ball.vy *= -0.5;
                        if(navigator.vibrate) navigator.vibrate(5);
                    }
                }
            });

            if (dist < 25) {
                active = false;
                winDisplay.classList.add('show-win');
                setTimeout(() => {
                    winDisplay.classList.remove('show-win');
                    generateWormsTerrain(); active = true;
                }, 3000);
            }
        }

        function draw() {
            // Painted Background
            let grd = ctx.createRadialGradient(cx, cy, 10, cx, cy, canvas.width/2);
            grd.addColorStop(0, "#4a1c0d"); grd.addColorStop(1, "#1a0f0a");
            ctx.fillStyle = grd; ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Lava Core (Hand-drawn look)
            ctx.shadowBlur = 25; ctx.shadowColor = "#ff4500";
            ctx.fillStyle = "#ff6a00";
            ctx.beginPath(); ctx.arc(cx, cy, 22, 0, 6.28); ctx.fill();

            // Craggy "Painterly" Walls
            ctx.lineWidth = 14;
            ctx.shadowBlur = 5; ctx.shadowColor = "black";
            walls.forEach(w => {
                ctx.strokeStyle = "#5c3c24"; // Rich Brown Rock
                ctx.beginPath();
                w.points.forEach((p, idx) => {
                    if (!(p.angle > w.gapS && p.angle < w.gapE)) {
                        if (idx === 0) ctx.moveTo(cx + p.x, cy + p.y);
                        else ctx.lineTo(cx + p.x, cy + p.y);
                    } else { ctx.beginPath(); }
                });
                ctx.stroke();
                // Add a "highlight" line for texture
                ctx.strokeStyle = "#7a553a"; ctx.lineWidth = 4;
                ctx.stroke();
            });

            // Ball
            ctx.fillStyle = "#eee"; ctx.shadowBlur = 10; ctx.shadowColor = "white";
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, 6.28); ctx.fill();

            update();
            requestAnimationFrame(draw);
        }

        startBtn.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => {
                    if (s === 'granted') window.addEventListener('deviceorientation', e => {
                        ball.vx += e.gamma * 0.15; ball.vy += e.beta * 0.15;
                    });
                });
            } else {
                window.addEventListener('deviceorientation', e => {
                    ball.vx += e.gamma * 0.15; ball.vy += e.beta * 0.15;
                });
            }
            document.getElementById('ui').style.display = "none"; active = true;
        });

        init(); draw();
    </script>
</body>
</html>
