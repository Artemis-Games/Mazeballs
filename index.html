<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Realistic Volcano Satellite View</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0b0907; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-align: center; z-index: 10; }
        button { pointer-events: auto; padding: 18px 40px; font-size: 22px; cursor: pointer; background: #3d1c02; color: #ff9d00; border: none; border-radius: 5px; box-shadow: 0 4px #210e01, 0 0 30px rgba(255, 69, 0, 0.4); text-transform: uppercase; font-weight: bold; }
        #win { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); color: #ff00ff; font-size: 50px; text-shadow: 0 0 20px #ff00ff; pointer-events: none; z-index: 100; transition: 0.5s; text-align: center; }
        .show-win { transform: translate(-50%, -50%) scale(1) !important; }
    </style>
</head>
<body>
    <div id="ui"><h1>AERIAL DESCENT</h1><button id="startBtn">DROP TO SURFACE</button></div>
    <div id="win">🪱<br>AAHHHMAZING!</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const winDisplay = document.getElementById('win');
        
        let ball = { x: 0, y: 0, radius: 4, vx: 0, vy: 0 };
        let terrainData = []; // Stores the "solid" parts of the mountain
        let active = false;
        let cx, cy;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cx = canvas.width / 2; cy = canvas.height / 2;
            renderTerrain();
            ball.x = 40; ball.y = 40;
        }

        function renderTerrain() {
            // Create a realistic satellite-style background
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
            const tctx = tempCanvas.getContext('2d');

            // 1. Base Ashy Rock
            tctx.fillStyle = "#1a1612";
            tctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. Generate Organic Mountain Ridges (The "Invisible" Walls)
            tctx.lineWidth = 15;
            for(let r = 80; r < Math.max(cx, cy); r += 45) {
                tctx.beginPath();
                tctx.strokeStyle = `rgba(40, 30, 20, ${0.3 + Math.random()})`;
                const gap = Math.random() * 6.28;
                // Jagged pathing
                for(let a = 0; a < 6.28; a += 0.1) {
                    const noise = Math.sin(a * 15) * 8;
                    const x = cx + Math.cos(a) * (r + noise);
                    const y = cy + Math.sin(a) * (r + noise);
                    
                    if (a > gap && a < gap + 0.9) tctx.moveTo(x, y);
                    else {
                        tctx.lineTo(x, y);
                        // Store wall position for physics
                        terrainData.push({x, y, r: r + noise, gS: gap, gE: gap+0.9});
                    }
                }
                tctx.stroke();
            }
            
            // 3. Add Crag Texture (Grain/Noise)
            for(let i=0; i<5000; i++) {
                tctx.fillStyle = `rgba(255,255,255,${Math.random()*0.05})`;
                tctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1, 1);
            }

            // 4. The Lava Crater
            let grad = tctx.createRadialGradient(cx, cy, 5, cx, cy, 35);
            grad.addColorStop(0, "#fff5a0"); grad.addColorStop(0.2, "#ff9d00");
            grad.addColorStop(0.6, "#ff4500"); grad.addColorStop(1, "transparent");
            tctx.fillStyle = grad;
            tctx.beginPath(); tctx.arc(cx, cy, 35, 0, 6.28); tctx.fill();

            // Set the generated terrain as background
            canvas.style.backgroundImage = `url(${tempCanvas.toDataURL()})`;
        }

        function update() {
            if (!active) return;
            ball.x += ball.vx; ball.y += ball.vy;
            ball.vx *= 0.98; ball.vy *= 0.98;

            const dist = Math.hypot(ball.x - cx, ball.y - cy);
            const angle = (Math.atan2(ball.y - cy, ball.x - cx) + 6.28) % 6.28;

            // Physics using Terrain Map
            terrainData.forEach(p => {
                const d = Math.hypot(ball.x - cx, ball.y - cy);
                if (Math.abs(d - p.r) < 6) {
                    const inGap = (angle > p.gS && angle < p.gE);
                    if (!inGap) {
                        const push = (d > p.r) ? 1.5 : -1.5;
                        ball.x = cx + Math.cos(angle) * (p.r + (push * 7));
                        ball.y = cy + Math.sin(angle) * (p.r + (push * 7));
                        ball.vx *= -0.4; ball.vy *= -0.4;
                        if(navigator.vibrate) navigator.vibrate(3);
                    }
                }
            });

            // Goal detection
            if (dist < 25) {
                active = false;
                winDisplay.classList.add('show-win');
                setTimeout(() => {
                    winDisplay.classList.remove('show-win');
                    init(); active = true;
                }, 3000);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Realistic Ball (Metallic Sphere with highlights)
            let bGrad = ctx.createRadialGradient(ball.x-2, ball.y-2, 1, ball.x, ball.y, ball.radius);
            bGrad.addColorStop(0, "#fff"); bGrad.addColorStop(1, "#666");
            ctx.fillStyle = bGrad;
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, 6.28); ctx.fill();

            update();
            requestAnimationFrame(draw);
        }

        startBtn.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => {
                    if (s === 'granted') window.addEventListener('deviceorientation', e => {
                        ball.vx += e.gamma * 0.15; ball.vy += e.beta * 0.15;
                    });
                });
            } else {
                window.addEventListener('deviceorientation', e => {
                    ball.vx += e.gamma * 0.15; ball.vy += e.beta * 0.15;
                });
            }
            document.getElementById('ui').style.display = "none"; active = true;
        });

        init(); draw();
    </script>
</body>
</html>
