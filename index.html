<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Realistic Satellite Labyrinth</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000 url('volcano.png') no-repeat center center; 
            background-size: cover;
            font-family: 'Arial Black', sans-serif; 
        }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        #ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-align: center; z-index: 10; }
        button { pointer-events: auto; padding: 20px 40px; font-size: 24px; cursor: pointer; background: rgba(0,0,0,0.7); color: #ff4500; border: 2px solid #ff4500; border-radius: 5px; text-transform: uppercase; }
        #win { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); color: #ff00ff; font-size: 50px; text-shadow: 0 0 20px #ff00ff; pointer-events: none; z-index: 100; transition: 0.5s; text-align: center; }
        .show-win { transform: translate(-50%, -50%) scale(1) !important; }
    </style>
</head>
<body>
    <div id="ui"><h1>AERIAL DESCENT</h1><button id="startBtn">DROP TO SURFACE</button></div>
    <div id="win">🪱<br>AAHHHMAZING!</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const winDisplay = document.getElementById('win');
        
        let ball = { x: 0, y: 0, radius: 5, vx: 0, vy: 0 };
        let walls = [];
        let active = false;
        let cx, cy;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cx = canvas.width / 2; cy = canvas.height / 2;
            
            // Generate invisible "collision" paths that follow the mountain ridges
            walls = [];
            const rings = 8;
            const dist = (Math.min(canvas.width, canvas.height)/2 - 50) / rings;
            for (let i = 1; i <= rings; i++) {
                let gap = Math.random() * 6.28;
                walls.push({ r: i * dist, gapS: gap, gapE: gap + 0.8 });
            }
            ball.x = 50; ball.y = 50;
        }

        function update() {
            if (!active) return;
            ball.x += ball.vx; ball.y += ball.vy;
            ball.vx *= 0.985; ball.vy *= 0.985; // Heavy marble feel

            const dist = Math.hypot(ball.x - cx, ball.y - cy);
            const angle = (Math.atan2(ball.y - cy, ball.x - cx) + 6.28) % 6.28;

            // Physics collision with "invisible" ridges
            walls.forEach(w => {
                if (Math.abs(dist - w.r) < ball.radius + 6) {
                    let inGap = (angle > w.gapS && angle < w.gapE);
                    if (!inGap) {
                        const push = (dist > w.r) ? 1.5 : -1.5;
                        ball.x = cx + Math.cos(angle) * (w.r + (push * 7));
                        ball.y = cy + Math.sin(angle) * (w.r + (push * 7));
                        ball.vx *= -0.5; ball.vy *= -0.5;
                        if(navigator.vibrate) navigator.vibrate(5);
                    }
                }
            });

            // Goal detection (The Volcano Core)
            if (dist < 30) {
                active = false;
                winDisplay.classList.add('show-win');
                setTimeout(() => {
                    winDisplay.classList.remove('show-win');
                    init(); active = true;
                }, 3000);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Realistic Ball (Metallic marble)
            let bGrad = ctx.createRadialGradient(ball.x-2, ball.y-2, 1, ball.x, ball.y, ball.radius);
            bGrad.addColorStop(0, "#fff"); bGrad.addColorStop(1, "#333");
            ctx.fillStyle = bGrad;
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, 6.28); ctx.fill();

            update();
            requestAnimationFrame(draw);
        }

        startBtn.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => {
                    if (s === 'granted') window.addEventListener('deviceorientation', e => {
                        ball.vx += e.gamma * 0.18; ball.vy += e.beta * 0.18;
                    });
                });
            } else {
                window.addEventListener('deviceorientation', e => {
                    ball.vx += e.gamma * 0.18; ball.vy += e.beta * 0.18;
                });
            }
            document.getElementById('ui').style.display = "none"; active = true;
        });

        init(); draw();
    </script>
</body>
</html>
