<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teleidoscope Volcano</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-align: center; z-index: 10; }
        button { pointer-events: auto; padding: 15px 35px; font-size: 20px; cursor: pointer; background: #111; color: orange; border: 3px solid orange; border-radius: 50px; text-transform: uppercase; box-shadow: 0 0 20px orange; }
        #winContainer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; flex-direction: column; align-items: center; pointer-events: none; z-index: 100; }
        #worm { font-size: 80px; }
        #winText { color: #f0f; font-size: 40px; text-shadow: 0 0 20px #f0f; opacity: 0; transform: scale(0.5); transition: 0.5s; }
        .show-win #winText { opacity: 1; transform: scale(1); }
    </style>
</head>
<body>
    <div id="ui"><h1>CORE WARP</h1><button id="startBtn">IGNITION</button></div>
    <div id="winContainer"><div id="worm">🪱</div><div id="winText">AAHHHMAZING!</div></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const winContainer = document.getElementById('winContainer');
        
        let ball = { x: 0, y: 0, radius: 6, vx: 0, vy: 0 };
        let walls = [];
        let active = false;
        let cx, cy, level = 1;
        let teleRotation = 0;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cx = canvas.width / 2; cy = canvas.height / 2;
            generateLevel();
        }

        function generateLevel() {
            walls = [];
            if (level % 2 !== 0) {
                // MAZE WORLD
                const rings = 6;
                const dist = (Math.min(canvas.width, canvas.height)/2 - 50) / rings;
                for (let i = 1; i <= rings; i++) {
                    let gap = Math.random() * 6.28;
                    walls.push({ r: i * dist, gapS: gap, gapE: gap + 0.6, type: 'neon' });
                }
                ball.x = cx + (rings * dist); ball.y = cy;
            } else {
                // VOLCANO WORLD
                walls.push({ r: Math.min(cx, cy) - 20, type: 'mountain' }); // Outer Mountain
                walls.push({ r: 40, type: 'lava' }); // Inner Volcano rim
                ball.x = cx + 100; ball.y = cy + 100;
            }
            ball.vx = 0; ball.vy = 0;
        }

        function drawTeleidoscope() {
            teleRotation += 0.01;
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(teleRotation);
            for (let i = 0; i < 8; i++) {
                ctx.rotate(Math.PI / 4);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(30, 60);
                ctx.lineTo(-30, 60);
                ctx.closePath();
                ctx.strokeStyle = `hsl(${(level * 40) + (i * 20)}, 100%, 50%)`;
                ctx.stroke();
            }
            ctx.restore();
        }

        function update() {
            if (!active) return;
            ball.x += ball.vx; ball.y += ball.vy;
            ball.vx *= 0.98; ball.vy *= 0.98;

            const dist = Math.hypot(ball.x - cx, ball.y - cy);
            const angle = (Math.atan2(ball.y - cy, ball.x - cx) + 6.28) % 6.28;

            walls.forEach(w => {
                if (Math.abs(dist - w.r) < ball.radius + 2) {
                    let blocked = true;
                    if (w.type === 'neon') {
                        blocked = !(angle > w.gapS && angle < w.gapE);
                    }
                    if (blocked) {
                        const push = (dist > w.r) ? 1 : -1;
                        ball.x = cx + Math.cos(angle) * (w.r + (push * (ball.radius + 4)));
                        ball.y = cy + Math.sin(angle) * (w.r + (push * (ball.radius + 4)));
                        ball.vx *= -0.5; ball.vy *= -0.5;
                    }
                }
            });

            // Finish: Falling into the center
            if (dist < 30) {
                active = false;
                winContainer.style.display = "flex";
                winContainer.classList.add('show-win');
                setTimeout(() => {
                    winContainer.classList.remove('show-win');
                    winContainer.style.display = "none";
                    level++; generateLevel(); active = true;
                }, 2000);
            }
        }

        function draw() {
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawTeleidoscope();

            walls.forEach(w => {
                ctx.beginPath();
                ctx.shadowBlur = 15;
                if (w.type === 'neon') {
                    ctx.strokeStyle = "#0ff"; ctx.shadowColor = "#0ff";
                    ctx.arc(cx, cy, w.r, w.gapE, w.gapS);
                } else if (w.type === 'mountain') {
                    ctx.strokeStyle = "#442200"; ctx.shadowColor = "#442200"; ctx.lineWidth = 10;
                    ctx.arc(cx, cy, w.r, 0, 6.28);
                } else if (w.type === 'lava') {
                    ctx.strokeStyle = "red"; ctx.shadowColor = "red";
                    ctx.arc(cx, cy, w.r, 0, 6.28);
                }
                ctx.stroke();
            });

            ctx.fillStyle = "white"; ctx.shadowBlur = 10;
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, 6.28); ctx.fill();

            update(); requestAnimationFrame(draw);
        }

        startBtn.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => {
                    if (s === 'granted') window.addEventListener('deviceorientation', e => {
                        ball.vx += e.gamma * 0.15; ball.vy += e.beta * 0.15;
                    });
                });
            } else {
                window.addEventListener('deviceorientation', e => {
                    ball.vx += e.gamma * 0.15; ball.vy += e.beta * 0.15;
                });
            }
            document.getElementById('ui').style.display = "none"; active = true;
        });

        window.addEventListener('resize', init);
        init(); draw();
    </script>
</body>
</html>
