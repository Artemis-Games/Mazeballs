<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Contour Labyrinth</title>
    <style>
        body { 
            margin: 0; overflow: hidden; background: #000;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        #bg-map {
            position: absolute; width: 100%; height: 100%;
            background: url('volcano.png') no-repeat center center;
            background-size: contain; z-index: 1;
        }
        canvas { position: absolute; top: 0; left: 0; z-index: 10; pointer-events: none; }
        #ui { position: absolute; z-index: 20; text-align: center; color: #fff; font-family: sans-serif; }
        button { padding: 15px 40px; font-size: 20px; background: #ff4500; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px #ff4500; }
    </style>
</head>
<body>
    <div id="bg-map"></div>
    <div id="ui"><h1>ASCENT</h1><button id="startBtn">START</button></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        let ball = { x: 50, y: 50, r: 8, vx: 0, vy: 0 };
        let active = false;
        let walls = [];

        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const cx = canvas.width / 2; const cy = canvas.height / 2;
            
            // Generate maze walls following the photo's circular switchbacks
            walls = [];
            const rings = 9;
            const step = (Math.min(cx, cy) - 40) / rings;
            for(let i = 1; i <= rings; i++) {
                let gap = Math.random() * 6.28;
                walls.push({ r: i * step, gapS: gap, gapE: gap + 0.7 });
            }
        }

        function update() {
            if (!active) return;
            ball.x += ball.vx; ball.y += ball.vy;
            ball.vx *= 0.985; ball.vy *= 0.985;

            const cx = canvas.width/2; const cy = canvas.height/2;
            const dist = Math.hypot(ball.x - cx, ball.y - cy);
            const angle = (Math.atan2(ball.y - cy, ball.x - cx) + 6.28) % 6.28;

            walls.forEach(w => {
                if (Math.abs(dist - w.r) < ball.r + 4) {
                    let inGap = (angle > w.gapS && angle < w.gapE);
                    if (!inGap) {
                        const push = (dist > w.r) ? 2 : -2;
                        ball.x = cx + Math.cos(angle) * (w.r + (push * 10));
                        ball.y = cy + Math.sin(angle) * (w.r + (push * 10));
                        ball.vx *= -0.4; ball.vy *= -0.4;
                    }
                }
            });

            if (dist < 30) { active = false; alert("AAHHHMAZING!"); location.reload(); }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // High-visibility neon ball
            ctx.shadowBlur = 15; ctx.shadowColor = "#0ff";
            ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, 6.28); ctx.fill();
            update(); requestAnimationFrame(draw);
        }

        startBtn.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => {
                    if (s === 'granted') window.addEventListener('deviceorientation', e => {
                        ball.vx += e.gamma * 0.18; ball.vy += e.beta * 0.18;
                    });
                });
            } else {
                window.addEventListener('deviceorientation', e => {
                    ball.vx += e.gamma * 0.18; ball.vy += e.beta * 0.18;
                });
            }
            document.getElementById('ui').style.display = "none"; active = true;
        });

        window.addEventListener('resize', init);
        init(); draw();
    </script>
</body>
</html>
