<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Labyrinth - Physical Walls</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #0ff; text-align: center; z-index: 10; }
        button { pointer-events: auto; padding: 15px 35px; font-size: 22px; cursor: pointer; background: #111; color: #0ff; border: 3px solid #0ff; border-radius: 50px; text-transform: uppercase; box-shadow: 0 0 20px #0ff; }
        #winMsg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 100%; text-align: center; color: #f0f; font-size: 50px; font-weight: bold;
            text-shadow: 0 0 30px #f0f; display: none; pointer-events: none; z-index: 100;
        }
        .zoom-anim { display: block !important; animation: zoomCenter 1.5s forwards cubic-bezier(0.17, 0.89, 0.32, 1.49); }
        @keyframes zoomCenter { 0% { transform: translate(-50%, -50%) scale(0); } 100% { transform: translate(-50%, -50%) scale(1); } }
    </style>
</head>
<body>
    <div id="ui"><h1>NEON WHEEL</h1><button id="startBtn">START GAME</button></div>
    <div id="winMsg">AAHHHMAZING!</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const winMsg = document.getElementById('winMsg');
        
        let ball = { x: 0, y: 0, radius: 8, vx: 0, vy: 0 };
        let walls = [];
        let goal = { radius: 25 };
        let active = false;
        let cx, cy;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cx = canvas.width / 2;
            cy = canvas.height / 2;
            generateMaze();
        }

        function generateMaze() {
            walls = [];
            const rings = 6;
            const ringDist = (Math.min(canvas.width, canvas.height) / 2 - 60) / rings;

            for (let i = 1; i <= rings; i++) {
                const r = i * ringDist;
                const gapAngle = Math.random() * Math.PI * 2;
                const gapSize = 0.7; // Size of the opening in radians
                walls.push({ r, gapStart: gapAngle, gapEnd: gapAngle + gapSize });
            }
            // Start the ball on the outside
            ball.x = cx + (rings * ringDist) + 15;
            ball.y = cy;
            ball.vx = 0; ball.vy = 0;
        }

        function checkWallCollisions() {
            const dx = ball.x - cx;
            const dy = ball.y - cy;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const angle = (Math.atan2(dy, dx) + Math.PI * 2) % (Math.PI * 2);

            walls.forEach(w => {
                // If ball is within the "thickness" of a wall ring
                const wallThickness = 4;
                if (dist + ball.radius > w.r - wallThickness && dist - ball.radius < w.r + wallThickness) {
                    
                    // Check if ball is in the gap
                    let inGap = false;
                    const normalizedGapEnd = w.gapEnd % (Math.PI * 2);
                    
                    if (w.gapStart < normalizedGapEnd) {
                        inGap = angle > w.gapStart && angle < normalizedGapEnd;
                    } else {
                        inGap = angle > w.gapStart || angle < normalizedGapEnd;
                    }

                    if (!inGap) {
                        // FORCE BALL OUTSIDE THE WALL (The Physics Fix)
                        const pushDir = (dist > w.r) ? 1 : -1;
                        const correctDist = w.r + (pushDir * (ball.radius + wallThickness + 1));
                        
                        ball.x = cx + Math.cos(angle) * correctDist;
                        ball.y = cy + Math.sin(angle) * correctDist;

                        // BOUNCE
                        ball.vx *= -0.6;
                        ball.vy *= -0.6;

                        if (navigator.vibrate) navigator.vibrate(15);
                    }
                }
            });
        }

        function update() {
            if (!active) return;

            // Apply gravity/tilt
            ball.x += ball.vx;
            ball.y += ball.vy;
            ball.vx *= 0.985; // Friction
            ball.vy *= 0.985;

            checkWallCollisions();

            // Screen boundary check
            if (ball.x < ball.radius || ball.x > canvas.width - ball.radius) ball.vx *= -0.7;
            if (ball.y < ball.radius || ball.y > canvas.height - ball.radius) ball.vy *= -0.7;

            // Goal detection
            const distToGoal = Math.hypot(ball.x - cx, ball.y - cy);
            if (distToGoal < goal.radius) {
                active = false;
                winMsg.classList.add('zoom-anim');
                setTimeout(() => {
                    winMsg.classList.remove('zoom-anim');
                    generateMaze();
                    active = true;
                }, 3000);
            }
        }

        function draw() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Goal
            ctx.strokeStyle = "#f0f"; ctx.lineWidth = 4; ctx.shadowBlur = 15; ctx.shadowColor = "#f0f";
            ctx.beginPath(); ctx.arc(cx, cy, goal.radius, 0, Math.PI * 2); ctx.stroke();

            // Draw Neon Walls
            ctx.strokeStyle = "#0ff"; ctx.shadowColor = "#0ff";
            walls.forEach(w => {
                ctx.beginPath();
                ctx.arc(cx, cy, w.r, w.gapEnd, w.gapStart);
                ctx.stroke();
            });

            // Draw Ball
            ctx.fillStyle = "#fff"; ctx.shadowColor = "#fff"; ctx.shadowBlur = 10;
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2); ctx.fill();

            update();
            requestAnimationFrame(draw);
        }

        function handleTilt(e) {
            if (!active) return;
            // Increased sensitivity for a snappier feel
            ball.vx += e.gamma * 0.18;
            ball.vy += e.beta * 0.18;
        }

        startBtn.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => {
                    if (s === 'granted') window.addEventListener('deviceorientation', handleTilt);
                });
            } else { window.addEventListener('deviceorientation', handleTilt); }
            document.getElementById('ui').style.display = "none";
            active = true;
        });

        window.addEventListener('resize', init);
        init(); draw();
    </script>
</body>
</html>
